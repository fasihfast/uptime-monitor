version: '3.8'

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: uptime-mongo
    restart: always          # auto-restart if container crashes
    volumes:
      - mongo_data:/data/db  # persist data even when container restarts
    networks:
      - uptime-network

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: uptime-redis
    restart: always
    networks:
      - uptime-network

  # ── Express Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend     # use the Dockerfile inside /backend folder
    container_name: uptime-backend
    restart: always
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/uptime-monitor2
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      - mongo                # backend starts AFTER mongo is ready
      - redis                # backend starts AFTER redis is ready
    networks:
      - uptime-network

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: uptime-frontend
    restart: always
    networks:
      - uptime-network

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: uptime-nginx
    restart: always
    ports:
      - "80:80"              # only nginx is exposed to the outside world
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro   # mount our config into nginx container
    depends_on:
      - backend
      - frontend
    networks:
      - uptime-network

# ── Shared network ────────────────────────────────────────────────────────────
# All containers talk to each other using service names as hostnames
# e.g. backend can reach redis at "redis:6379"
networks:
  uptime-network:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  mongo_data: