events {
    # maximum simultaneous connections nginx can handle
    worker_connections 1024;
}

http {
    # ── Upstream servers ─────────────────────────────────────────────────────
    # These names match the service names in docker-compose.yml exactly
    # Docker's internal DNS resolves "backend" to the backend container's IP

    upstream backend {
        server backend:5000;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;

        # ── API requests → Express backend ───────────────────────────────────
        # Any request starting with /api/ is forwarded to Express
        location /api/ {
            proxy_pass http://backend;

            # These headers tell Express the real client IP and protocol
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Everything else → React frontend ─────────────────────────────────
        location / {
            proxy_pass http://frontend;

            # Required for Vite's hot module replacement (HMR) in development
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}